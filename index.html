* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  font-family: 'Press Start 2P', monospace;
  background: #2b2b2e;
  display: flex; align-items: center; justify-content: center;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
}

/* ---------- Gehäuse ---------- */
.gameboy {
  position: relative;
  width: min(100vw, 420px);
  height: min(100dvh, 900px);
  background: linear-gradient(160deg, var(--shell) 0%, var(--shell-dark) 100%);
  border-radius: 12px 12px 48px 12px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.5), inset 0 -4px 8px rgba(0,0,0,.15), 0 16px 40px rgba(0,0,0,.6);
  display: flex; flex-direction: column;
  padding: 14px 18px calc(18px + env(safe-area-inset-bottom));
  gap: 12px;
  transition: background .3s;
}

.topline {
  border-top: 2px solid var(--shell-shadow);
  border-bottom: 2px solid var(--shell-shadow);
  height: 8px; margin: 0 -18px; padding: 0 18px;
  position: relative;
}
.topline::after {
  content: ""; position: absolute; top: 2px; left: 24px; right: 24px; height: 2px;
  background: var(--shell-shadow);
}

.main-wrap { flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
.screen-col { display: flex; flex-direction: column; gap: 12px; }
.keypad { flex: 1; display: flex; gap: 10px; min-height: 0; }

/* ---------- Screen-Bereich ---------- */
.bezel {
  background: linear-gradient(180deg, var(--bezel-light), var(--bezel));
  border-radius: 10px 10px 32px 10px;
  padding: 16px 22px 14px;
  box-shadow: inset 0 2px 6px rgba(0,0,0,.5);
  transition: background .3s;
}
.bezel-label {
  color: var(--bezel-text); font-size: .45rem; letter-spacing: 1px;
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.bezel-label::before, .bezel-label::after {
  content: ""; height: 2px; flex: 1;
  background: linear-gradient(90deg, var(--stripe1), var(--stripe2));
}
.lcd {
  background: var(--lcd);
  border: 3px solid var(--lcd-border);
  border-radius: 4px;
  padding: 14px 12px 10px;
  box-shadow: inset 0 0 12px rgba(0,0,0,.22);
  position: relative;
  overflow: hidden;
  transition: background .3s;
}
.lcd::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0 1px, transparent 1px 3px),
              repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px);
}
.lcd .expr {
  color: var(--ink); opacity: .55; font-size: .55rem; min-height: .9rem;
  text-align: right; white-space: nowrap; overflow: hidden;
}
.lcd .value {
  color: var(--ink); text-align: right; margin-top: 8px;
  font-size: 1.6rem; line-height: 1.2;
  white-space: nowrap; overflow: hidden;
  text-shadow: 1px 1px 0 var(--ink-glow);
}
.lcd .value.small { font-size: 1.15rem; }
.lcd .value.tiny  { font-size: .85rem; }

/* Rechenverlauf im LCD */
.lcd .hist { display: none; margin-top: 6px; max-height: 8.5rem; overflow-y: auto; }
.lcd.show-hist .hist { display: block; }
.lcd.show-hist .value, .lcd.show-hist .expr { display: none; }
.hist .h-title { color: var(--ink); font-size: .5rem; opacity: .6; margin-bottom: 6px; }
.hist .h-row {
  color: var(--ink); font-size: .55rem; line-height: 1.6;
  display: flex; justify-content: space-between; gap: 8px;
  border-bottom: 1px solid var(--lcd-border); padding: 3px 0;
  cursor: pointer;
}
.hist .h-empty { color: var(--ink); font-size: .55rem; opacity: .6; }

/* Boot-Animation */
.boot {
  position: absolute; inset: 0; z-index: 3;
  background: var(--lcd);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink); font-size: 1rem; letter-spacing: 2px;
}
.boot span { animation: bootdrop 1.1s cubic-bezier(.3,1.4,.5,1) both; }
@keyframes bootdrop {
  0%   { transform: translateY(-320%); }
  70%  { transform: translateY(0); }
  82%  { transform: translateY(-12%); }
  100% { transform: translateY(0); }
}
.boot.fade { opacity: 0; transition: opacity .35s; }
@media (prefers-reduced-motion: reduce) {
  .boot span { animation: none; }
  .gameboy, .bezel, .lcd { transition: none; }
}

.power {
  display: flex; align-items: center; gap: 6px; margin-top: 10px;
  color: var(--bezel-text); font-size: .4rem; letter-spacing: 1px;
}
.power .led {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff8080, #c00);
  box-shadow: 0 0 6px #f00;
}

.brand {
  text-align: center; color: var(--brand); font-size: .8rem; letter-spacing: 1px;
}
.brand span { font-size: .45rem; vertical-align: super; }

/* ---------- Tasten ---------- */
.keys {
  flex: 1; display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  align-content: stretch;
}
.sci-keys {
  display: none;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  align-content: stretch;
}
button {
  font-family: inherit; font-size: .85rem; border: none; cursor: pointer;
  border-radius: 10px; color: #fff;
  background: linear-gradient(180deg, var(--btn-dark-light), var(--btn-dark));
  box-shadow: 0 4px 0 var(--btn-dark-shadow), inset 0 1px 0 rgba(255,255,255,.15);
  transition: transform .05s, box-shadow .05s;
  min-height: 52px;
}
button:active, button.pressed {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--btn-dark-shadow), inset 0 1px 0 rgba(255,255,255,.15);
}
button.op {
  background: radial-gradient(circle at 35% 30%, var(--btn-ab-light), var(--btn-ab));
  box-shadow: 0 4px 0 var(--btn-ab-dark), inset 0 1px 0 rgba(255,255,255,.25);
  border-radius: 50%;
  font-size: 1rem;
}
button.op:active, button.op.pressed {
  box-shadow: 0 1px 0 var(--btn-ab-dark), inset 0 1px 0 rgba(255,255,255,.25);
}
button.fn {
  background: linear-gradient(180deg, var(--btn-start-light), var(--btn-start));
  color: var(--fn-text); font-size: .6rem;
  border-radius: 999px; min-height: 40px;
  box-shadow: 0 3px 0 var(--btn-start-shadow), inset 0 1px 0 rgba(255,255,255,.4);
}
button.fn:active, button.fn.pressed { box-shadow: 0 1px 0 var(--btn-start-shadow); }
button.eq {
  grid-column: 1 / -1;
  background: radial-gradient(circle at 35% 30%, var(--btn-ab-light), var(--btn-ab));
  box-shadow: 0 4px 0 var(--btn-ab-dark), inset 0 1px 0 rgba(255,255,255,.25);
  border-radius: 999px;
  font-size: 1.2rem;
  min-height: 48px;
}
button.eq:active, button.eq.pressed { box-shadow: 0 1px 0 var(--btn-ab-dark); }
button.zero { grid-column: span 2; border-radius: 26px; }

/* Pill-Tasten oben */
.sound-toggle, .theme-toggle, .game-toggle {
  position: absolute; top: 12px;
  font-size: .45rem; letter-spacing: 1px;
  color: var(--fn-text);
  background: linear-gradient(180deg, var(--btn-start-light), var(--btn-start));
  border-radius: 999px;
  min-height: 0; padding: 7px 12px;
  box-shadow: 0 2px 0 var(--btn-start-shadow), inset 0 1px 0 rgba(255,255,255,.4);
  z-index: 2;
}
.sound-toggle { right: 18px; }
.theme-toggle { left: 18px; }
.game-toggle { left: 0; right: 0; margin: 0 auto; width: max-content; }
.sound-toggle:active, .theme-toggle:active, .game-toggle:active {
  transform: translateY(2px); box-shadow: 0 0 0 var(--btn-start-shadow);
}
.sound-toggle.off { opacity: .55; }

/* ---------- Quermodus: wissenschaftliche Tasten ---------- */
@media (orientation: landscape) and (max-height: 560px) {
  .gameboy {
    width: 100vw; height: 100dvh;
    border-radius: 12px; padding: 10px 14px 12px; gap: 8px;
  }
  .topline { display: none; }
  .main-wrap { flex-direction: row; gap: 14px; align-items: stretch; }
  .screen-col { flex: 0 0 42%; justify-content: center; }
  .bezel { padding: 10px 14px 8px; }
  .lcd .value { font-size: 1.25rem; }
  .keypad { flex: 1; }
  .sci-keys { display: grid; flex: 0 0 30%; }
  .keys { gap: 7px; }
  button { min-height: 34px; font-size: .7rem; }
  button.fn { min-height: 30px; font-size: .5rem; }
  button.eq { min-height: 36px; font-size: .9rem; }
  button.sci { min-height: 0; font-size: .5rem; }
  .brand { display: none; }
  .power { display: none; }
}
</style>
</head>
<body>

<div class="gameboy">
  <button class="theme-toggle" id="themeBtn" aria-label="Theme wechseln">THEME</button>
  <button class="game-toggle" id="gameBtn" aria-label="Spiel starten">GAME</button>
  <button class="sound-toggle" id="soundBtn" aria-label="Sound an/aus">SND ON</button>
  <div class="topline"></div>

  <div class="main-wrap">
    <div class="screen-col">
      <div class="bezel">
        <div class="bezel-label">DOT MATRIX WITH CALC POWER</div>
        <div class="lcd" id="lcd">
          <div class="boot" id="boot"><span>CALC BOY</span></div>
          <div class="expr" id="expr">&nbsp;</div>
          <div class="value" id="display">0</div>
          <div class="hist" id="hist"></div>
        </div>
        <div class="power"><span class="led"></span> BATTERY</div>
      </div>
      <div class="brand">CALC BOY<span>&#8482;</span></div>
    </div>

    <div class="keypad">
      <div class="sci-keys">
        <button class="fn sci" data-a="sci" data-fn="sin">sin</button>
        <button class="fn sci" data-a="sci" data-fn="cos">cos</button>
        <button class="fn sci" data-a="sci" data-fn="tan">tan</button>
        <button class="fn sci" data-a="sci" data-fn="log">log</button>
        <button class="fn sci" data-a="sci" data-fn="ln">ln</button>
        <button class="fn sci" data-a="sci" data-fn="sqr">x&#178;</button>
        <button class="fn sci" data-a="sci" data-fn="inv">1/x</button>
        <button class="fn sci" data-a="op" data-op="^">x&#694;</button>
        <button class="fn sci" data-a="const" data-fn="pi">&#960;</button>
        <button class="fn sci" data-a="const" data-fn="e">e</button>
      </div>

      <div class="keys">
        <button class="fn" data-a="clear">AC</button>
        <button class="fn" data-a="sign">&#177;</button>
        <button class="fn" data-a="percent">%</button>
        <button class="op" data-a="sqrt">&#8730;</button>

        <button data-a="digit">7</button>
        <button data-a="digit">8</button>
        <button data-a="digit">9</button>
        <button class="op" data-a="op" data-op="/">&#247;</button>

        <button data-a="digit">4</button>
        <button data-a="digit">5</button>
        <button data-a="digit">6</button>
        <button class="op" data-a="op" data-op="*">&#215;</button>

        <button data-a="digit">1</button>
        <button data-a="digit">2</button>
        <button data-a="digit">3</button>
        <button class="op" data-a="op" data-op="-">&#8722;</button>

        <button class="zero" data-a="digit">0</button>
        <button data-a="comma">,</button>
        <button class="op" data-a="op" data-op="+">+</button>

        <button class="eq" data-a="equals">=</button>
      </div>
    </div>
  </div>
</div>

<script>
// ---------- Lokaler Speicher (nur auf dem Geraet, siehe SECURITY.md) ----------
const store = {
  load() { try { return JSON.parse(localStorage.getItem("calcboy")) || {}; } catch (e) { return {}; } },
  save(patch) {
    try {
      const s = this.load();
      Object.assign(s, patch);
      localStorage.setItem("calcboy", JSON.stringify(s));
    } catch (e) {}
  }
};
const saved = store.load();

// ---------- PWA-Manifest inline ----------
try {
  const isHttp = location.protocol === "http:" || location.protocol === "https:";
  const manifest = {
    name: "CALC BOY", short_name: "CALC BOY",
    display: "standalone", background_color: "#2b2b2e", theme_color: "#b8b4ac",
    start_url: ".",
    icons: isHttp
      ? [{ src: new URL("icon-512.png", location.href).href, sizes: "512x512", type: "image/png" }]
      : []
  };
  const mBlob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
  const mLink = document.createElement("link");
  mLink.rel = "manifest"; mLink.href = URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);
} catch (e) {}

// ---------- Service Worker (Offline-Caching, nur ueber https) ----------
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

// ---------- Rechner-Logik ----------
const lcdEl = document.getElementById("lcd");
const displayEl = document.getElementById("display");
const exprEl = document.getElementById("expr");
const histEl = document.getElementById("hist");

let current = "0";
let previous = null;
let operator = null;
let justEvaluated = false;
let history = Array.isArray(saved.history) ? saved.history.slice(0, 10) : [];
let histOpen = false;

const OPS = { "+": "+", "-": "\u2212", "*": "\u00d7", "/": "\u00f7", "^": "^" };

function fmt(numStr) {
  if (numStr === "ERROR") return "ERROR";
  let [int, dec] = numStr.split(".");
  const neg = int.startsWith("-");
  if (neg) int = int.slice(1);
  int = int.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return (neg ? "-" : "") + int + (dec !== undefined ? "," + dec : "");
}

function roundResult(n) {
  if (!isFinite(n)) return "ERROR";
  const r = Math.round(n * 1e10) / 1e10;
  let s = String(r);
  if (s.includes("e")) return r.toPrecision(8).replace(/\.?0+$/, "");
  if (s.replace(/[-.]/g, "").length > 12) s = String(Number(r.toPrecision(12)));
  return s;
}

function pushHistory(exprText, res) {
  history.unshift({ e: exprText, r: res });
  history = history.slice(0, 10);
  store.save({ history });
}

function evaluate() {
  if (previous === null || operator === null) return;
  const a = parseFloat(previous), b = parseFloat(current);
  let r;
  switch (operator) {
    case "+": r = a + b; break;
    case "-": r = a - b; break;
    case "*": r = a * b; break;
    case "/": r = b === 0 ? Infinity : a / b; break;
    case "^": r = Math.pow(a, b); break;
  }
  const exprText = fmt(previous) + " " + OPS[operator] + " " + fmt(current);
  current = roundResult(r);
  if (current !== "ERROR") pushHistory(exprText, current);
  previous = null; operator = null; justEvaluated = true;
}

const DEG = Math.PI / 180;
const SCI = {
  sin: v => Math.sin(v * DEG),
  cos: v => Math.cos(v * DEG),
  tan: v => Math.tan(v * DEG),
  log: v => Math.log10(v),
  ln:  v => Math.log(v),
  sqr: v => v * v,
  inv: v => 1 / v
};
const CONSTS = { pi: Math.PI, e: Math.E };

const actions = {
  digit(v) {
    if (justEvaluated || current === "ERROR") { current = "0"; justEvaluated = false; }
    if (current.replace(/[-.]/g, "").length >= 12) return;
    current = current === "0" ? v : current + v;
  },
  comma() {
    if (justEvaluated || current === "ERROR") { current = "0"; justEvaluated = false; }
    if (!current.includes(".")) current += ".";
  },
  op(_, opVal) {
    if (current === "ERROR") return;
    if (previous !== null && operator !== null && !justEvaluated) evaluate();
    if (current === "ERROR") return;
    previous = current; operator = opVal;
    current = "0"; justEvaluated = false;
  },
  equals() { if (current !== "ERROR") evaluate(); },
  clear() { current = "0"; previous = null; operator = null; justEvaluated = false; },
  sign() {
    if (current === "0" || current === "ERROR") return;
    current = current.startsWith("-") ? current.slice(1) : "-" + current;
  },
  percent() {
    if (current === "ERROR") return;
    current = roundResult(parseFloat(current) / 100);
  },
  sqrt() {
    if (current === "ERROR") return;
    const n = parseFloat(current);
    current = n < 0 ? "ERROR" : roundResult(Math.sqrt(n));
    justEvaluated = true;
  },
  sci(_, __, fnName) {
    if (current === "ERROR") return;
    current = roundResult(SCI[fnName](parseFloat(current)));
    justEvaluated = true;
  },
  const(_, __, fnName) {
    current = roundResult(CONSTS[fnName]);
    justEvaluated = true;
  }
};

// ---------- Anzeige ----------
function render() {
  if (game) { renderGame(); return; }
  const text = fmt(current);
  displayEl.textContent = text;
  displayEl.classList.toggle("small", text.length > 9 && text.length <= 13);
  displayEl.classList.toggle("tiny", text.length > 13);
  exprEl.innerHTML = previous !== null && operator
    ? fmt(previous) + " " + OPS[operator]
    : "&nbsp;";
}

function renderHist() {
  histEl.innerHTML = "";
  const title = document.createElement("div");
  title.className = "h-title";
  title.textContent = "VERLAUF \u2013 TIPPEN = UEBERNEHMEN";
  histEl.appendChild(title);
  if (!history.length) {
    const em = document.createElement("div");
    em.className = "h-empty";
    em.textContent = "NOCH LEER";
    histEl.appendChild(em);
    return;
  }
  history.forEach(h => {
    const row = document.createElement("div");
    row.className = "h-row";
    const l = document.createElement("span"); l.textContent = h.e;
    const r = document.createElement("span"); r.textContent = "= " + fmt(h.r);
    row.appendChild(l); row.appendChild(r);
    row.addEventListener("click", (ev) => {
      ev.stopPropagation();
      current = h.r; justEvaluated = true;
      toggleHist(false); render(); beep(880);
    });
    histEl.appendChild(row);
  });
}

function toggleHist(on) {
  histOpen = on === undefined ? !histOpen : on;
  if (histOpen) renderHist();
  lcdEl.classList.toggle("show-hist", histOpen);
}
lcdEl.addEventListener("click", () => { if (!game) toggleHist(); });

// ---------- 8-Bit-Sound ----------
let soundOn = saved.sound !== false;
let audioCtx = null;
function tone(freq, dur, when) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = "square"; o.frequency.value = freq;
  const t = audioCtx.currentTime + (when || 0);
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}
function beep(freq = 880, dur = 0.05) {
  if (!soundOn) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    tone(freq, dur);
  } catch (e) {}
}
function jingle(notes) {
  if (!soundOn) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    notes.forEach(n => tone(n[0], n[1], n[2]));
  } catch (e) {}
}

const soundBtn = document.getElementById("soundBtn");
function renderSoundBtn() {
  soundBtn.textContent = soundOn ? "SND ON" : "SND OFF";
  soundBtn.classList.toggle("off", !soundOn);
}
soundBtn.addEventListener("click", () => {
  soundOn = !soundOn;
  store.save({ sound: soundOn });
  renderSoundBtn();
  if (soundOn) beep(1200, 0.08);
});
renderSoundBtn();

// ---------- Themes ----------
const THEMES = [
  { id: "",           name: "GAME BOY" },
  { id: "color",      name: "GB COLOR" },
  { id: "nes",        name: "NES" },
  { id: "snes",       name: "SUPER NES" },
  { id: "switch",     name: "SWITCH" },
  { id: "famicom",    name: "FAMICOM" }
];
let vbUnlocked = saved.vbUnlocked === true;
if (vbUnlocked) THEMES.push({ id: "virtualboy", name: "VIRTUAL BOY" });

const gameboyEl = document.querySelector(".gameboy");
function applyTheme(idx) {
  const t = THEMES[idx % THEMES.length];
  if (t.id) gameboyEl.dataset.theme = t.id;
  else delete gameboyEl.dataset.theme;
  return t;
}
let themeIdx = 0;
if (typeof saved.theme === "string") {
  const i = THEMES.findIndex(t => t.id === saved.theme);
  if (i >= 0) themeIdx = i;
}
applyTheme(themeIdx);

let themeTimer = null;
function flashExpr(text, ms) {
  exprEl.textContent = text;
  clearTimeout(themeTimer);
  themeTimer = setTimeout(render, ms || 1200);
}
document.getElementById("themeBtn").addEventListener("click", () => {
  themeIdx = (themeIdx + 1) % THEMES.length;
  const t = applyTheme(themeIdx);
  store.save({ theme: t.id });
  toggleHist(false);
  flashExpr("\u00bb " + t.name);
  beep(990, 0.06);
});

// ---------- Konami-Code: 8 8 2 2 4 6 4 6 - +  (oder Pfeile + B A) ----------
const KONAMI = ["8","8","2","2","4","6","4","6","-","+"];
let seq = [];
function konamiPush(token) {
  if (vbUnlocked) return;
  seq.push(token);
  if (seq.length > KONAMI.length) seq.shift();
  if (seq.join(",") === KONAMI.join(",")) {
    vbUnlocked = true;
    THEMES.push({ id: "virtualboy", name: "VIRTUAL BOY" });
    themeIdx = THEMES.length - 1;
    applyTheme(themeIdx);
    store.save({ vbUnlocked: true, theme: "virtualboy" });
    flashExpr("\u00bb VIRTUAL BOY FREI!", 2200);
    jingle([[660,.09,0],[880,.09,.1],[1100,.09,.2],[1320,.18,.3]]);
  }
}

// ---------- MATH ATTACK (Spielmodus) ----------
let game = null;
let hiscore = Number.isFinite(saved.hiscore) ? saved.hiscore : 0;
const gameBtn = document.getElementById("gameBtn");

function genQuestion() {
  const ops = ["+", "-", "*", "/"];
  const op = ops[Math.floor(Math.random() * 4)];
  let a, b, ans;
  if (op === "+") { a = rnd(2, 99); b = rnd(2, 99); ans = a + b; }
  else if (op === "-") { a = rnd(10, 99); b = rnd(2, a); ans = a - b; }
  else if (op === "*") { a = rnd(2, 12); b = rnd(2, 12); ans = a * b; }
  else { b = rnd(2, 12); ans = rnd(2, 12); a = b * ans; }
  return { text: a + " " + OPS[op] + " " + b, ans };
}
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function startGame() {
  toggleHist(false);
  game = { score: 0, time: 30, over: false, q: genQuestion() };
  current = "0";
  game.timer = setInterval(() => {
    game.time--;
    if (game.time <= 0) endGame();
    else renderGame();
  }, 1000);
  jingle([[880,.08,0],[1100,.12,.1]]);
  renderGame();
}
function endGame() {
  clearInterval(game.timer);
  game.over = true;
  if (game.score > hiscore) { hiscore = game.score; store.save({ hiscore }); }
  jingle([[440,.12,0],[330,.12,.14],[220,.25,.28]]);
  renderGame();
}
function quitGame() {
  if (game && game.timer) clearInterval(game.timer);
  game = null;
  actions.clear();
  render();
}
function renderGame() {
  if (game.over) {
    exprEl.textContent = "GAME OVER \u2013 TASTE = ZURUECK";
    displayEl.textContent = "S:" + game.score + " HI:" + hiscore;
    displayEl.classList.add("small"); displayEl.classList.remove("tiny");
    return;
  }
  exprEl.textContent = game.q.text + " = ?  T:" + game.time + " S:" + game.score;
  const text = fmt(current);
  displayEl.textContent = text;
  displayEl.classList.toggle("small", text.length > 9);
  displayEl.classList.remove("tiny");
}
function handleGameKey(a) {
  if (game.over) { quitGame(); return; }
  if (a === "clear") { quitGame(); return; }
  if (a === "digit" || a === "comma" || a === "sign") return true; // normal editieren
  if (a === "equals") {
    if (parseFloat(current) === game.q.ans) {
      game.score++;
      beep(1320, 0.09);
    } else {
      beep(150, 0.2);
    }
    game.q = genQuestion();
    current = "0";
    renderGame();
  }
  return false;
}
gameBtn.addEventListener("click", () => {
  if (game) quitGame(); else startGame();
});

// ---------- Eingabe ----------
document.querySelectorAll(".keys button, .sci-keys button").forEach(btn => {
  btn.addEventListener("click", () => {
    const a = btn.dataset.a;
    toggleHist(false);
    konamiPush(btn.dataset.op || btn.textContent);
    if (game) {
      const passthrough = handleGameKey(a);
      if (!passthrough) return;
      actions[a](btn.textContent, btn.dataset.op, btn.dataset.fn);
      if (navigator.vibrate) navigator.vibrate(8);
      renderGame();
      return;
    }
    actions[a](btn.textContent, btn.dataset.op, btn.dataset.fn);
    beep(a === "equals" ? 1320 : a === "op" ? 660 : 880);
    if (navigator.vibrate) navigator.vibrate(8);
    render();
  });
});

// Tastatur-Support (Mac/iPad)
const KEYMAP_KONAMI = { ArrowUp: "8", ArrowDown: "2", ArrowLeft: "4", ArrowRight: "6", b: "-", a: "+" };
window.addEventListener("keydown", (e) => {
  const k = e.key;
  if (KEYMAP_KONAMI[k] !== undefined && !/^[0-9]$/.test(k)) konamiPush(KEYMAP_KONAMI[k]);
  let btn = null;
  if (/^[0-9]$/.test(k)) btn = [...document.querySelectorAll('[data-a="digit"]')].find(b => b.textContent === k);
  else if (k === "," || k === ".") btn = document.querySelector('[data-a="comma"]');
  else if (["+", "-", "*", "/"].includes(k)) btn = document.querySelector(`[data-op="${k}"]`);
  else if (k === "Enter" || k === "=") btn = document.querySelector('[data-a="equals"]');
  else if (k === "Escape") btn = document.querySelector('[data-a="clear"]');
  else if (k === "%") btn = document.querySelector('[data-a="percent"]');
  else if (k === "r" || k === "w") btn = document.querySelector('[data-a="sqrt"]');
  if (btn) {
    e.preventDefault();
    btn.classList.add("pressed");
    setTimeout(() => btn.classList.remove("pressed"), 80);
    btn.click();
  }
});

// ---------- Boot ----------
const bootEl = document.getElementById("boot");
setTimeout(() => {
  jingle([[1046.5,.07,0],[2093,.22,.08]]); // "Ba-Ding" (startet nur, wenn Audio erlaubt)
  bootEl.classList.add("fade");
  setTimeout(() => bootEl.remove(), 400);
}, 1400);

render();
</script>
