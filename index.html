* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  font-family: 'Press Start 2P', monospace;
  background: #2b2b2e;
  display: flex; align-items: center; justify-content: center;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
}

.gameboy {
  position: relative;
  width: min(100vw, 420px);
  height: min(100dvh, 900px);
  background: linear-gradient(160deg, var(--shell) 0%, var(--shell-dark) 100%);
  border-radius: 12px 12px 48px 12px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.5), inset 0 -4px 8px rgba(0,0,0,.15), 0 16px 40px rgba(0,0,0,.6);
  display: flex; flex-direction: column;
  padding: calc(14px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
  gap: 12px;
  transition: background .3s;
}

.topline {
  border-top: 2px solid var(--shell-shadow);
  border-bottom: 2px solid var(--shell-shadow);
  height: 8px; margin: 0 -18px; padding: 0 18px;
  position: relative;
}
.topline::after {
  content: ""; position: absolute; top: 2px; left: 24px; right: 24px; height: 2px;
  background: var(--shell-shadow);
}

.main-wrap { flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
.screen-col { display: flex; flex-direction: column; gap: 12px; }
.keypad { flex: 1; display: flex; gap: 10px; min-height: 0; }

.bezel {
  background: linear-gradient(180deg, var(--bezel-light), var(--bezel));
  border-radius: 10px 10px 32px 10px;
  padding: 16px 22px 14px;
  box-shadow: inset 0 2px 6px rgba(0,0,0,.5);
  transition: background .3s;
  overflow: hidden;
}
.bezel-label {
  color: var(--bezel-text); font-size: .45rem; letter-spacing: 1px;
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.bezel-label::before, .bezel-label::after {
  content: ""; height: 2px; flex: 1;
  background: linear-gradient(90deg, var(--stripe1), var(--stripe2));
}
.lcd {
  background: var(--lcd);
  border: 3px solid var(--lcd-border);
  border-radius: 4px;
  padding: 14px 12px 10px;
  box-shadow: inset 0 0 12px rgba(0,0,0,.22);
  position: relative;
  overflow: hidden;
  transition: background .3s;
}
.lcd::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0 1px, transparent 1px 3px),
              repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px);
}
.lcd .expr {
  color: var(--ink); opacity: .55; font-size: .55rem; min-height: .9rem;
  text-align: right; white-space: nowrap; overflow: hidden;
}
.lcd .value {
  color: var(--ink); text-align: right; margin-top: 8px;
  font-size: 1.6rem;
  line-height: 1;
  height: 1.6rem;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  white-space: nowrap;
  overflow: hidden;
  text-shadow: 1px 1px 0 var(--ink-glow);
}
.lcd .value.small { font-size: 1.15rem; }
.lcd .value.tiny  { font-size: .85rem; }
.lcd canvas.overlay { position: absolute; inset: 0; z-index: 2; width: 100%; height: 100%; }

.lcd .hist { display: none; margin-top: 6px; max-height: 8.5rem; overflow-y: auto; }
.lcd.show-hist .hist { display: block; }
.lcd.show-hist .value, .lcd.show-hist .expr { display: none; }
.hist .h-title { color: var(--ink); font-size: .5rem; opacity: .6; margin-bottom: 6px; }
.hist .h-row {
  color: var(--ink); font-size: .55rem; line-height: 1.6;
  display: flex; justify-content: space-between; gap: 8px;
  border-bottom: 1px solid var(--lcd-border); padding: 3px 0;
  cursor: pointer;
}
.hist .h-stat { cursor: default; opacity: .7; border-bottom: none; }
.hist .h-empty { color: var(--ink); font-size: .55rem; opacity: .6; }

.boot {
  position: absolute; inset: 0; z-index: 3;
  background: var(--lcd);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink); font-size: 1rem; letter-spacing: 2px;
}
.boot span { animation: bootdrop 1.1s cubic-bezier(.3,1.4,.5,1) both; }
@keyframes bootdrop {
  0%   { transform: translateY(-320%); }
  70%  { transform: translateY(0); }
  82%  { transform: translateY(-12%); }
  100% { transform: translateY(0); }
}
.boot.fade { opacity: 0; transition: opacity .35s; }

.lcd.swap { animation: cartswap .55s ease-in-out; }
@keyframes cartswap {
  0% { transform: translateY(0); }
  45% { transform: translateY(115%); }
  55% { transform: translateY(115%); }
  100% { transform: translateY(0); }
}

.mflag {
  position: absolute; top: 6px; left: 8px; z-index: 1;
  font-size: .5rem; color: var(--ink); opacity: .7; display: none;
}
.lcd.has-mem .mflag { display: block; }

.power {
  display: flex; align-items: center; gap: 6px; margin-top: 10px;
  color: var(--bezel-text); font-size: .4rem; letter-spacing: 1px;
}
.power .led {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff8080, #c00);
  box-shadow: 0 0 6px #f00;
}
.power .led.ok  { background: radial-gradient(circle at 35% 35%, #9dff9d, #0a0); box-shadow: 0 0 6px #0c0; }
.power .led.mid { background: radial-gradient(circle at 35% 35%, #ffe08a, #c90); box-shadow: 0 0 6px #fc0; }
.power .led.low { animation: ledblink 1s step-start infinite; }
@keyframes ledblink { 50% { opacity: .15; } }

@media (prefers-reduced-motion: reduce) {
  .boot span { animation: none; }
  .gameboy, .bezel, .lcd { transition: none; }
  .lcd.swap { animation: none; }
  .power .led.low { animation: none; opacity: .6; }
}

.brand {
  text-align: center; color: var(--brand); font-size: .8rem; letter-spacing: 1px;
}
.brand span { font-size: .45rem; vertical-align: super; }

/* ---------- Tastenfelder / Seiten ---------- */
.keys, .keys-ext, .keys-conv, .keys-fin, .keys-prg, .keys-plot, .keys-form {
  flex: 1;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 10px;
  align-content: stretch;
}
/* Untere Navigationszeile immer in Reihe 6 verankern -> einheitliche Tastengroesse auf allen Seiten */
button.extbtn, button.eq2, button.eq3 { grid-row: 6; }
.keys { display: grid; }
.keys-ext, .keys-conv, .keys-fin, .keys-prg, .keys-plot, .keys-form { display: none; }
.keypad[data-page="ext"]  .keys-ext  { display: grid; }
.keypad[data-page="conv"] .keys-conv { display: grid; }
.keypad[data-page="fin"]  .keys-fin  { display: grid; }
.keypad[data-page="prg"]  .keys-prg  { display: grid; }
.keypad[data-page="plot"] .keys-plot { display: grid; }
.keypad[data-page="form"] .keys-form { display: grid; }
.keypad[data-page] .keys { display: none; }

.sci-keys {
  display: none;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  align-content: stretch;
}

button {
  font-family: inherit; font-size: .85rem; border: none; cursor: pointer;
  border-radius: 10px; color: #fff;
  background: linear-gradient(180deg, var(--btn-dark-light), var(--btn-dark));
  box-shadow: 0 4px 0 var(--btn-dark-shadow), inset 0 1px 0 rgba(255,255,255,.15);
  transition: transform .05s, box-shadow .05s;
  min-height: 52px;
}
button:active, button.pressed {
  transform: translateY(3px);
  box-shadow: 0 1px 0 var(--btn-dark-shadow), inset 0 1px 0 rgba(255,255,255,.15);
}
button.op {
  background: radial-gradient(circle at 35% 30%, var(--btn-ab-light), var(--btn-ab));
  box-shadow: 0 4px 0 var(--btn-ab-dark), inset 0 1px 0 rgba(255,255,255,.25);
  border-radius: 50%;
  font-size: 1rem;
}
button.op:active, button.op.pressed {
  box-shadow: 0 1px 0 var(--btn-ab-dark), inset 0 1px 0 rgba(255,255,255,.25);
}
button.fn {
  background: linear-gradient(180deg, var(--btn-start-light), var(--btn-start));
  color: var(--fn-text); font-size: .6rem;
  border-radius: 999px; min-height: 40px;
  box-shadow: 0 3px 0 var(--btn-start-shadow), inset 0 1px 0 rgba(255,255,255,.4);
}
button.fn:active, button.fn.pressed { box-shadow: 0 1px 0 var(--btn-start-shadow); }
button.eq {
  grid-column: 1 / -1;
  background: radial-gradient(circle at 35% 30%, var(--btn-ab-light), var(--btn-ab));
  box-shadow: 0 4px 0 var(--btn-ab-dark), inset 0 1px 0 rgba(255,255,255,.25);
  border-radius: 999px;
  font-size: 1.2rem;
  min-height: 48px;
}
button.eq:active, button.eq.pressed { box-shadow: 0 1px 0 var(--btn-ab-dark); }
button.zero { grid-column: span 2; border-radius: 26px; }
button.eq3 { grid-column: 2 / -1; }
button.eq2 { grid-column: 3 / -1; }
button.extbtn { min-height: 48px; border-radius: 999px; }

.keys-ext button.fn, .keys-conv button.fn, .keys-fin button.fn,
.keys-prg button.fn, .keys-plot button.fn, .keys-form button.fn {
  min-height: 52px; border-radius: 10px; font-size: .55rem;
}
.keys-conv button.fn, .keys-fin button.fn { font-size: .45rem; }
.keys-ext button.extbtn, .keys-conv button.extbtn, .keys-fin button.extbtn,
.keys-prg button.extbtn, .keys-plot button.extbtn, .keys-form button.extbtn { border-radius: 999px; }

.sound-toggle, .theme-toggle, .game-toggle {
  position: absolute; top: calc(12px + env(safe-area-inset-top));
  font-size: .45rem; letter-spacing: 1px;
  color: var(--fn-text);
  background: linear-gradient(180deg, var(--btn-start-light), var(--btn-start));
  border-radius: 999px;
  min-height: 0; padding: 7px 12px;
  box-shadow: 0 2px 0 var(--btn-start-shadow), inset 0 1px 0 rgba(255,255,255,.4);
  z-index: 2;
}
.sound-toggle { right: 18px; }
.theme-toggle { left: 18px; }
.game-toggle { left: 0; right: 0; margin: 0 auto; width: max-content; }
.sound-toggle:active, .theme-toggle:active, .game-toggle:active {
  transform: translateY(2px); box-shadow: 0 0 0 var(--btn-start-shadow);
}
.sound-toggle.off { opacity: .55; }

/* ---------- Quermodus ---------- */
@media (orientation: landscape) and (max-height: 560px) {
  .gameboy {
    width: 100vw; height: 100dvh;
    border-radius: 12px;
    padding: calc(10px + env(safe-area-inset-top)) 14px calc(12px + env(safe-area-inset-bottom));
    gap: 8px;
  }
  .topline { display: none; }
  .main-wrap { flex-direction: row; gap: 14px; align-items: stretch; }
  .screen-col { flex: 0 0 42%; justify-content: center; }
  .bezel { padding: 10px 14px 8px; }
  .lcd .value { font-size: 1.25rem; }
  .keypad { flex: 1; }
  .sci-keys { display: grid; flex: 0 0 30%; }
  .keypad[data-page] .sci-keys { display: none; }
  .keys, .keys-ext, .keys-conv, .keys-fin, .keys-prg, .keys-plot, .keys-form { gap: 7px; }
  button { min-height: 34px; font-size: .7rem; }
  button.fn { min-height: 30px; font-size: .5rem; }
  button.eq { min-height: 36px; font-size: .9rem; }
  button.sci { min-height: 0; font-size: .5rem; }
  .keys-ext button.fn, .keys-prg button.fn, .keys-plot button.fn, .keys-form button.fn { min-height: 34px; font-size: .45rem; }
  .keys-conv button.fn, .keys-fin button.fn { min-height: 34px; font-size: .4rem; }
  .brand { display: none; }
  .power { display: none; }
}
</style>
</head>

        <button class="fn" data-a="formula" data-fn="pyth">PYTH</button>
        <button class="fn" data-a="formula" data-fn="ohm">OHM</button>
        <button class="fn" data-a="formula" data-fn="bmi">BMI</button>
        <button class="fn" data-a="formula" data-fn="avg">Ø ABC</button>

        <button class="fn" data-a="fclear">VAR C</button>
        <button class="fn" data-a="formula" data-fn="speed">KM/H</button>
        <button class="fn" data-a="formula" data-fn="net19">NET19</button>
        <button class="fn" data-a="formula" data-fn="gross19">BRU19</button>

        <button class="fn extbtn" data-a="page" data-fn="basic">BASIC</button>
        <button class="fn extbtn" data-a="pnext">MEHR</button>
        <button class="eq eq2" data-a="equals">=</button>
      </div>
    </div>
  </div>
</div>

<script>
// ---------- Lokaler Speicher (nur auf dem Geraet, siehe SECURITY.md) ----------
const store = {
  load() { try { return JSON.parse(localStorage.getItem("calcboy")) || {}; } catch (e) { return {}; } },
  save(patch) {
    try {
      const s = this.load();
      Object.assign(s, patch);
      localStorage.setItem("calcboy", JSON.stringify(s));
    } catch (e) {}
  }
};
const saved = store.load();

// ---------- PWA-Manifest inline ----------
try {
  const isHttp = location.protocol === "http:" || location.protocol === "https:";
  const manifest = {
    name: "CALC BOY", short_name: "CALC BOY",
    display: "standalone", background_color: "#2b2b2e", theme_color: "#b8b4ac",
    start_url: ".",
    icons: isHttp
      ? [{ src: new URL("icon-512.png", location.href).href, sizes: "512x512", type: "image/png" }]
      : []
  };
  const mBlob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
  const mLink = document.createElement("link");
  mLink.rel = "manifest"; mLink.href = URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);
} catch (e) {}

if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

// ---------- Grund-Elemente ----------
const lcdEl = document.getElementById("lcd");
const gameboyEl = document.querySelector(".gameboy");
const displayEl = document.getElementById("display");
const exprEl = document.getElementById("expr");
const histEl = document.getElementById("hist");
const keypadEl = document.querySelector(".keypad");

let current = "0";
let previous = null;
let operator = null;
let justEvaluated = false;
let history = Array.isArray(saved.history) ? saved.history.slice(0, 10) : [];
let histOpen = false;
let rpnMode = saved.rpn === true;
let rpnStack = Array.isArray(saved.rpnStack) ? saved.rpnStack.filter(v => isFinite(parseFloat(v))).slice(-8) : [];
let formulaVars = Object.assign({ a: 0, b: 0, c: 0 }, (saved.formulaVars && typeof saved.formulaVars === "object") ? saved.formulaVars : {});

const OPS = {
  "+": "+", "-": "\u2212", "*": "\u00d7", "/": "\u00f7", "^": "^",
  "and": "AND", "or": "OR", "xor": "XOR", "mod": "MOD", "shl": "\u00ab", "shr": "\u00bb"
};

function fmt(numStr) {
  if (numStr === "ERROR") return "ERROR";
  let [int, dec] = numStr.split(".");
  const neg = int.startsWith("-");
  if (neg) int = int.slice(1);
  int = int.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return (neg ? "-" : "") + int + (dec !== undefined ? "," + dec : "");
}

function roundResult(n) {
  if (!isFinite(n)) return "ERROR";
  const r = Math.round(n * 1e10) / 1e10;
  let s = String(r);
  if (s.includes("e")) return r.toPrecision(8).replace(/\.?0+$/, "");
  if (s.replace(/[-.]/g, "").length > 12) s = String(Number(r.toPrecision(12)));
  return s;
}

function pushHistory(exprText, res) {
  history.unshift({ e: exprText, r: res });
  history = history.slice(0, 10);
  store.save({ history });
}

function evaluate() {
  if (previous === null || operator === null) return;
  const a = parseFloat(previous), b = parseFloat(current);
  const ia = Math.trunc(a), ib = Math.trunc(b);
  let r;
  switch (operator) {
    case "+": r = a + b; break;
    case "-": r = a - b; break;
    case "*": r = a * b; break;
    case "/": r = b === 0 ? Infinity : a / b; break;
    case "^": r = Math.pow(a, b); break;
    case "and": r = ia & ib; break;
    case "or":  r = ia | ib; break;
    case "xor": r = ia ^ ib; break;
    case "mod": r = ib === 0 ? Infinity : ia % ib; break;
    case "shl": r = ia << ib; break;
    case "shr": r = ia >> ib; break;
  }
  const exprText = fmt(previous) + " " + OPS[operator] + " " + fmt(current);
  current = roundResult(r);
  if (current !== "ERROR") pushHistory(exprText, current);
  previous = null; operator = null; justEvaluated = true;
}

function binaryResult(a, b, op) {
  const ia = Math.trunc(a), ib = Math.trunc(b);
  switch (op) {
    case "+": return a + b;
    case "-": return a - b;
    case "*": return a * b;
    case "/": return b === 0 ? Infinity : a / b;
    case "^": return Math.pow(a, b);
    case "and": return ia & ib;
    case "or":  return ia | ib;
    case "xor": return ia ^ ib;
    case "mod": return ib === 0 ? Infinity : ia % ib;
    case "shl": return ia << ib;
    case "shr": return ia >> ib;
  }
  return NaN;
}
function saveRpnStack() { store.save({ rpnStack }); }
function rpnPushValue() {
  if (current === "ERROR") return;
  rpnStack.push(current);
  rpnStack = rpnStack.slice(-8);
  saveRpnStack();
  justEvaluated = true;
  flashExpr("RPN STACK: " + rpnStack.length);
}
function rpnApply(opVal) {
  if (current === "ERROR" || !rpnStack.length) { flashExpr("RPN: ERST ZAHL + ="); return; }
  const b = parseFloat(current);
  const aStr = rpnStack.pop();
  const a = parseFloat(aStr);
  const r = binaryResult(a, b, opVal);
  const exprText = fmt(aStr) + " " + OPS[opVal] + " " + fmt(current);
  current = roundResult(r);
  if (current !== "ERROR") pushHistory("RPN " + exprText, current);
  saveRpnStack();
  justEvaluated = true;
}
function applyFormula(name) {
  const A = parseFloat(formulaVars.a), B = parseFloat(formulaVars.b), C = parseFloat(formulaVars.c);
  let r, label;
  if (name === "percent") { r = B * A / 100; label = A + "% VON " + B; }
  else if (name === "rule3") { r = A === 0 ? Infinity : B * C / A; label = "DREISATZ"; }
  else if (name === "circleA") { r = Math.PI * A * A; label = "KREIS FLAECHE r=A"; }
  else if (name === "circleU") { r = 2 * Math.PI * A; label = "KREIS UMFANG r=A"; }
  else if (name === "pyth") { r = Math.sqrt(A * A + B * B); label = "PYTH A/B"; }
  else if (name === "ohm") { r = A * B; label = "OHM U=R*A I=B"; }
  else if (name === "bmi") { r = B === 0 ? Infinity : A / (B * B); label = "BMI kg=A m=B"; }
  else if (name === "avg") { r = (A + B + C) / 3; label = "DURCHSCHNITT ABC"; }
  else if (name === "speed") { r = B === 0 ? Infinity : A / B; label = "KM/H A=km B=h"; }
  else if (name === "net19") { r = A / 1.19; label = "NETTO 19% A=BRUTTO"; }
  else if (name === "gross19") { r = A * 1.19; label = "BRUTTO 19% A=NETTO"; }
  current = roundResult(r);
  if (current !== "ERROR") pushHistory(label, current);
  justEvaluated = true;
  flashExpr(label, 2200);
}

// ---------- Funktions-Sammlungen ----------
const DEG = Math.PI / 180;
let degMode = saved.deg !== false;
let memory = typeof saved.memory === "number" && isFinite(saved.memory) ? saved.memory : 0;
function trigArg(v) { return degMode ? v * DEG : v; }
function factorial(v) {
  if (v < 0 || v !== Math.floor(v) || v > 170) return NaN;
  let r = 1;
  for (let i = 2; i <= v; i++) r *= i;
  return r;
}
const SCI = {
  sin: v => Math.sin(trigArg(v)),
  cos: v => Math.cos(trigArg(v)),
  tan: v => Math.tan(trigArg(v)),
  log: v => Math.log10(v),
  ln:  v => Math.log(v),
  sqr: v => v * v,
  cube: v => v * v * v,
  cbrt: v => Math.cbrt(v),
  tenx: v => Math.pow(10, v),
  ex:  v => Math.exp(v),
  inv: v => 1 / v,
  fact: factorial
};
const CONSTS = { pi: Math.PI, e: Math.E };
const CONV = {
  km_mi:  [v => v * 0.62137119224, "km \u2192 mi"],
  mi_km:  [v => v * 1.609344, "mi \u2192 km"],
  m_ft:   [v => v * 3.280839895, "m \u2192 ft"],
  ft_m:   [v => v * 0.3048, "ft \u2192 m"],
  c_f:    [v => v * 9 / 5 + 32, "\u00b0C \u2192 \u00b0F"],
  f_c:    [v => (v - 32) * 5 / 9, "\u00b0F \u2192 \u00b0C"],
  kg_lb:  [v => v * 2.2046226218, "kg \u2192 lb"],
  lb_kg:  [v => v * 0.45359237, "lb \u2192 kg"],
  cm_in:  [v => v / 2.54, "cm \u2192 in"],
  in_cm:  [v => v * 2.54, "in \u2192 cm"],
  l_gal:  [v => v * 0.2641720524, "l \u2192 gal (US)"],
  gal_l:  [v => v * 3.785411784, "gal (US) \u2192 l"],
  kmh_mph:[v => v * 0.62137119224, "km/h \u2192 mph"],
  mph_kmh:[v => v * 1.609344, "mph \u2192 km/h"],
  h_min:  [v => v * 60, "h \u2192 min"],
  min_h:  [v => v / 60, "min \u2192 h"],
  vat19:  [v => v * 1.19, "NETTO \u2192 BRUTTO 19%"],
  devat19:[v => v / 1.19, "BRUTTO \u2192 NETTO 19%"],
  vat7:   [v => v * 1.07, "NETTO \u2192 BRUTTO 7%"],
  devat7: [v => v / 1.07, "BRUTTO \u2192 NETTO 7%"]
};

// Finanz-Parameter (lokal gespeichert)
const FIN_DEF = { k0: 1000, p: 3, j: 10, rate: 50, persons: 2, fx: 1.08 };
let fin = Object.assign({}, FIN_DEF, (saved.fin && typeof saved.fin === "object") ? saved.fin : {});
const FIN_LABEL = { k0: "STARTKAPITAL", p: "ZINS %/JAHR", j: "JAHRE", rate: "RATE/MONAT", persons: "PERSONEN", fx: "KURS" };

function finFuture() {
  const i = fin.p / 1200, m = Math.round(fin.j * 12);
  if (i === 0) return fin.k0 + fin.rate * m;
  return fin.k0 * Math.pow(1 + i, m) + fin.rate * ((Math.pow(1 + i, m) - 1) / i);
}

// ---------- Seiten ----------
const PAGE_ORDER = ["ext", "conv", "fin", "prg", "plot", "form"];
function setPage(target) {
  if (target === "basic") delete keypadEl.dataset.page;
  else keypadEl.dataset.page = target;
}

// ---------- Actions ----------
const actions = {
  digit(v) {
    if (justEvaluated || current === "ERROR") { current = "0"; justEvaluated = false; }
    if (current.replace(/[-.]/g, "").length >= 12) return;
    current = current === "0" ? v : current + v;
  },
  comma() {
    if (justEvaluated || current === "ERROR") { current = "0"; justEvaluated = false; }
    if (!current.includes(".")) current += ".";
  },
  op(_, opVal) {
    if (rpnMode) { rpnApply(opVal); return; }
    if (current === "ERROR") return;
    if (previous !== null && operator !== null && !justEvaluated) evaluate();
    if (current === "ERROR") return;
    previous = current; operator = opVal;
    current = "0"; justEvaluated = false;
  },
  equals() {
    if (current === "ERROR") return;
    if (rpnMode) { rpnPushValue(); return; }
    evaluate();
  },
  clear() {
    current = "0"; previous = null; operator = null; justEvaluated = false;
    if (rpnMode) { rpnStack = []; saveRpnStack(); flashExpr("RPN STACK GELOESCHT"); }
  },
  sign() {
    if (current === "0" || current === "ERROR") return;
    current = current.startsWith("-") ? current.slice(1) : "-" + current;
  },
  percent() {
    if (current === "ERROR") return;
    // Smarte Prozent-Logik: 100 + 10 % = 110 (Prozent vom ersten Operanden)
    if (previous !== null && (operator === "+" || operator === "-"))
      current = roundResult(parseFloat(previous) * parseFloat(current) / 100);
    else
      current = roundResult(parseFloat(current) / 100);
  },
  sqrt() {
    if (current === "ERROR") return;
    const n = parseFloat(current);
    current = n < 0 ? "ERROR" : roundResult(Math.sqrt(n));
    justEvaluated = true;
  },
  sci(_, __, fnName) {
    if (current === "ERROR") return;
    current = roundResult(SCI[fnName](parseFloat(current)));
    justEvaluated = true;
  },
  const(_, __, fnName) {
    current = roundResult(CONSTS[fnName]);
    justEvaluated = true;
  },
  page(_, __, target) { if (!game && !snake) setPage(target); },
  pnext() {
    if (game || snake) return;
    const cur = keypadEl.dataset.page || "ext";
    const i = PAGE_ORDER.indexOf(cur);
    setPage(PAGE_ORDER[(i + 1) % PAGE_ORDER.length]);
  },
  conv(_, __, fnName) {
    if (current === "ERROR") return;
    const c = CONV[fnName];
    current = roundResult(c[0](parseFloat(current)));
    justEvaluated = true;
    flashExpr("\u00bb " + c[1]);
  },
  mem(_, __, fnName) {
    if (current === "ERROR" && fnName !== "mc" && fnName !== "mr") return;
    if (fnName === "mc") memory = 0;
    else if (fnName === "mr") { current = roundResult(memory); justEvaluated = true; }
    else if (fnName === "mplus") memory += parseFloat(current) || 0;
    else if (fnName === "mminus") memory -= parseFloat(current) || 0;
    store.save({ memory });
    updateMemFlag();
  },
  degrad() {
    degMode = !degMode;
    store.save({ deg: degMode });
    document.getElementById("degBtn").textContent = degMode ? "DEG" : "RAD";
    flashExpr("\u00bb " + (degMode ? "GRAD (DEG)" : "BOGENMASS (RAD)"));
  },
  finset(_, __, key) {
    if (current === "ERROR") return;
    let v = parseFloat(current);
    if (key === "persons") v = Math.max(1, Math.round(v));
    if (key === "j" || key === "rate" || key === "k0") v = Math.max(0, v);
    if (key === "fx" && v <= 0) return;
    fin[key] = v;
    store.save({ fin });
    justEvaluated = true;
    flashExpr("\u00bb " + FIN_LABEL[key] + " = " + fmt(roundResult(v)), 1600);
  },
  fin(_, __, fnName) {
    if (fnName === "info") {
      const months = Math.round(fin.j * 12);
      const end = finFuture();
      const paid = fin.k0 + fin.rate * months;
      const interest = end - paid;
      flashExpr(
        "END " + fmt(roundResult(end)) +
        " | EIN " + fmt(roundResult(paid)) +
        " | ZINS " + fmt(roundResult(interest)),
        4200
      );
      return;
    }
    if (fnName === "reset") {
      fin = Object.assign({}, FIN_DEF);
      store.save({ fin });
      flashExpr("\u00bb FIN ZURUECKGESETZT");
      return;
    }
    if (current === "ERROR" && fnName !== "endwert" && fnName !== "zinsen") return;
    if (fnName === "endwert") {
      current = roundResult(finFuture());
      if (current !== "ERROR") pushHistory("ZINSESZINS ENDWERT", current);
      justEvaluated = true;
      flashExpr("K0 " + fmt(roundResult(fin.k0)) + " + RATE " + fin.rate + " \u00b7 " + fin.j + "J @" + fin.p + "%", 2600);
    } else if (fnName === "zinsen") {
      const m = Math.round(fin.j * 12);
      current = roundResult(finFuture() - fin.k0 - fin.rate * m);
      justEvaluated = true;
      flashExpr("\u00bb ZINSERTRAG NACH " + fin.j + " JAHREN", 2000);
    } else if (fnName === "tip10" || fnName === "tip15" || fnName === "tip20") {
      const pct = Number(fnName.slice(3));
      current = roundResult(parseFloat(current) * (1 + pct / 100));
      justEvaluated = true;
      flashExpr("\u00bb + " + pct + "% TRINKGELD");
    } else if (fnName === "split") {
      current = roundResult(parseFloat(current) / fin.persons);
      justEvaluated = true;
      flashExpr("\u00bb GETEILT DURCH " + fin.persons);
    } else if (fnName === "eur_usd") {
      current = roundResult(parseFloat(current) * fin.fx);
      justEvaluated = true;
      flashExpr("\u00bb EUR \u2192 USD @ " + fin.fx);
    } else if (fnName === "usd_eur") {
      current = roundResult(parseFloat(current) / fin.fx);
      justEvaluated = true;
      flashExpr("\u00bb USD \u2192 EUR @ " + fin.fx);
    }
  },
  prg(_, __, fnName) {
    if (fnName === "rndm") {
      current = String(1 + Math.floor(Math.random() * 100));
      justEvaluated = true;
      flashExpr("\u00bb ZUFALL 1-100");
      return;
    }
    if (current === "ERROR") return;
    const v = parseFloat(current), iv = Math.trunc(v);
    if (fnName === "hex" || fnName === "bin" || fnName === "oct") {
      const base = fnName === "hex" ? 16 : fnName === "bin" ? 2 : 8;
      const s = (iv < 0 ? "-" : "") + Math.abs(iv).toString(base).toUpperCase();
      flashExpr(fnName.toUpperCase() + ": " + s, 3200);
      return;
    }
    if (fnName === "not") current = roundResult(~iv);
    else if (fnName === "abs") current = roundResult(Math.abs(v));
    else if (fnName === "int") current = roundResult(iv);
    else if (fnName === "sgn") current = roundResult(Math.sign(v));
    justEvaluated = true;
  },
  rpn() {
    rpnMode = !rpnMode;
    previous = null; operator = null; justEvaluated = true;
    store.save({ rpn: rpnMode });
    flashExpr(rpnMode ? "» RPN MODUS AN" : "» RPN MODUS AUS", 1800);
  },
  fset(_, __, key) {
    if (current === "ERROR") return;
    formulaVars[key] = parseFloat(current) || 0;
    store.save({ formulaVars });
    justEvaluated = true;
    flashExpr("SET " + key.toUpperCase() + " = " + fmt(roundResult(formulaVars[key])), 1600);
  },
  fclear() {
    formulaVars = { a: 0, b: 0, c: 0 };
    store.save({ formulaVars });
    flashExpr("FORMEL VARIABLEN GELOESCHT");
  },
  finfo() {
    flashExpr("A=" + fmt(roundResult(formulaVars.a)) + " B=" + fmt(roundResult(formulaVars.b)) + " C=" + fmt(roundResult(formulaVars.c)), 3200);
  },
  formula(_, __, fnName) { applyFormula(fnName); },
  plot(_, __, fnName) { startPlot(fnName); }
};

function updateMemFlag() {
  lcdEl.classList.toggle("has-mem", memory !== 0);
}

// ---------- Anzeige ----------
function render() {
  if (snake) return;
  if (game) { renderGame(); return; }
  const text = fmt(current);
  displayEl.textContent = text;
  displayEl.classList.toggle("small", text.length > 9 && text.length <= 13);
  displayEl.classList.toggle("tiny", text.length > 13);
  if (rpnMode) {
    const top = rpnStack.length ? fmt(rpnStack[rpnStack.length - 1]) : "LEER";
    exprEl.textContent = "RPN " + rpnStack.length + " | " + top;
  } else {
    exprEl.innerHTML = previous !== null && operator
      ? fmt(previous) + " " + OPS[operator]
      : "&nbsp;";
  }
}

async function shareHistoryPng() {
  if (!history.length) return;
  const cs = getComputedStyle(gameboyEl);
  const ink = cs.getPropertyValue("--ink").trim() || "#0f380f";
  const lcd = cs.getPropertyValue("--lcd").trim() || "#9bbc0f";
  const rows = history.slice(0, 10);
  const w = 900, pad = 42, lineH = 48;
  const h = pad * 2 + 66 + rows.length * lineH;
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  const ctx = c.getContext("2d");
  ctx.fillStyle = lcd; ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = "rgba(0,0,0,.08)";
  for (let y = 0; y < h; y += 6) ctx.fillRect(0, y, w, 2);
  ctx.fillStyle = ink;
  ctx.font = "28px 'Press Start 2P', monospace";
  ctx.fillText("CALC BOY VERLAUF", pad, pad + 12);
  ctx.font = "20px 'Press Start 2P', monospace";
  rows.forEach((row, i) => {
    const y = pad + 72 + i * lineH;
    const left = (row.e || "").slice(0, 24);
    const right = ("= " + fmt(row.r)).slice(0, 22);
    ctx.fillText(left, pad, y);
    ctx.textAlign = "right";
    ctx.fillText(right, w - pad, y);
    ctx.textAlign = "left";
  });
  const blob = await new Promise(resolve => c.toBlob(resolve, "image/png"));
  if (!blob) return;
  const file = new File([blob], "calcboy-verlauf.png", { type: "image/png" });
  try {
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ title: "CALC BOY Verlauf", files: [file] });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "calcboy-verlauf.png"; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }
    beep(1100, 0.07);
  } catch (e) {}
}

function renderHist() {
  histEl.innerHTML = "";
  const title = document.createElement("div");
  title.className = "h-title";
  title.textContent = "VERLAUF \u2013 TIPPEN = UEBERNEHMEN";
  histEl.appendChild(title);
  if (history.length) {
    const share = document.createElement("div");
    share.className = "h-row";
    share.textContent = "\u00bb TEILEN / EXPORT";
    share.addEventListener("click", async (ev) => {
      ev.stopPropagation();
      const text = "CALC BOY \u2013 Verlauf\n" +
        history.map(h => h.e + " = " + fmt(h.r)).join("\n");
      try {
        if (navigator.share) await navigator.share({ title: "CALC BOY", text });
        else { await navigator.clipboard.writeText(text); flashExpr("\u00bb KOPIERT"); }
        beep(1100, 0.07);
      } catch (e) {}
    });
    histEl.appendChild(share);
    const png = document.createElement("div");
    png.className = "h-row";
    png.textContent = "» PNG TEILEN";
    png.addEventListener("click", async (ev) => {
      ev.stopPropagation();
      await shareHistoryPng();
    });
    histEl.appendChild(png);
  }
  if (!history.length) {
    const em = document.createElement("div");
    em.className = "h-empty";
    em.textContent = "NOCH LEER";
    histEl.appendChild(em);
    return;
  }
  history.forEach(h => {
    const row = document.createElement("div");
    row.className = "h-row";
    const l = document.createElement("span"); l.textContent = h.e;
    const r = document.createElement("span"); r.textContent = "= " + fmt(h.r);
    row.appendChild(l); row.appendChild(r);

      ev.stopPropagation();
      current = h.r; justEvaluated = true;
      toggleHist(false); render(); beep(880);
    });
    histEl.appendChild(row);
  });
  // Statistik: Summe und Mittelwert der Ergebnisse
  const vals = history.map(h => parseFloat(h.r)).filter(isFinite);
  if (vals.length) {
    const sum = vals.reduce((a, b) => a + b, 0);
    const s1 = document.createElement("div");

    s2.innerHTML = "<span>\u00d8</span><span>" + fmt(roundResult(sum / vals.length)) + "</span>";

    histEl.appendChild(s2);
  }
}

let soundOn = saved.sound !== false;
let audioCtx = null;
const THEME_SOUND = {
  "":           { wave: "square",   mult: 1 },
  "color":      { wave: "square",   mult: 1.19 },
  "nes":        { wave: "triangle", mult: 0.84 },
  "snes":       { wave: "sawtooth", mult: 0.94 },
  "switch":     { wave: "sine",     mult: 1.33 },
  "famicom":    { wave: "square",   mult: 0.89 },
  "virtualboy": { wave: "sawtooth", mult: 0.67 }
};
function curSound() {
  return THEME_SOUND[gameboyEl.dataset.theme || ""] || THEME_SOUND[""];
}
function tone(freq, dur, when) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  const s = curSound();
  o.type = s.wave; o.frequency.value = freq * s.mult;
  const t = audioCtx.currentTime + (when || 0);
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}
function beep(freq = 880, dur = 0.05) {
  if (!soundOn) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    tone(freq, dur);
  } catch (e) {}
}
function jingle(notes) {
  if (!soundOn) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    notes.forEach(n => tone(n[0], n[1], n[2]));
  } catch (e) {}
}

// ---------- PLOT-Modus ----------
let plotActive = null;
const PLOTS = {
  sin:  { f: x => Math.sin(x),   x0: -6.5, x1: 6.5, label: "y = sin x" },
  cos:  { f: x => Math.cos(x),   x0: -6.5, x1: 6.5, label: "y = cos x" },
  tan:  { f: x => Math.tan(x),   x0: -6.5, x1: 6.5, label: "y = tan x", clip: 4 },
  sqr:  { f: x => x * x,         x0: -4,   x1: 4,   label: "y = x\u00b2" },
  cube: { f: x => x * x * x,     x0: -3,   x1: 3,   label: "y = x\u00b3" },
  sqrt: { f: x => Math.sqrt(x),  x0: 0,    x1: 16,  label: "y = \u221ax" },
  log:  { f: x => Math.log10(x), x0: 0.05, x1: 20,  label: "y = log x" },
  inv:  { f: x => 1 / x,         x0: -4,   x1: 4,   label: "y = 1/x", clip: 5 },
  expx: { f: x => Math.exp(x),   x0: -3,   x1: 3,   label: "y = e^x" },
  lnx:  { f: x => Math.log(x),   x0: 0.05, x1: 12,  label: "y = ln x" },
  absx: { f: x => Math.abs(x),   x0: -4,   x1: 4,   label: "y = |x|" },
  twox: { f: x => Math.pow(2,x), x0: -3,   x1: 4,   label: "y = 2^x" },
  sinh: { f: x => Math.sinh(x),  x0: -3,   x1: 3,   label: "y = sinh x" },
  cosh: { f: x => Math.cosh(x),  x0: -3,   x1: 3,   label: "y = cosh x" },
  tanh: { f: x => Math.tanh(x),  x0: -4,   x1: 4,   label: "y = tanh x" },
  x4:   { f: x => x*x*x*x,       x0: -2.5, x1: 2.5, label: "y = x\u2074" },
  gauss:{ f: x => Math.exp(-x*x),x0: -3.5, x1: 3.5, label: "y = e^(-x\u00b2)" },
  floor:{ f: x => Math.floor(x), x0: -4,   x1: 4,   label: "y = \u230ax\u230b" },
  sinc: { f: x => x === 0 ? 1 : Math.sin(x)/x, x0: -15, x1: 15, label: "y = sin x / x" },
  xsinx:{ f: x => x * Math.sin(x), x0: -12, x1: 12, label: "y = x\u00b7sin x" }
};
function startPlot(name) {
  closePlot();
  const p = PLOTS[name];
  const { c, ctx, w, h } = makeLcdCanvas();
  const col = lcdColors();
  ctx.fillStyle = col.lcd; ctx.fillRect(0, 0, w, h);
  const N = 240, pts = [];
  let ymin = Infinity, ymax = -Infinity;
  for (let i = 0; i <= N; i++) {
    const x = p.x0 + (p.x1 - p.x0) * i / N;
    let y = p.f(x);
    if (!isFinite(y)) y = null;
    else if (p.clip && Math.abs(y) > p.clip) y = null;
    pts.push([x, y]);
    if (y !== null) { ymin = Math.min(ymin, y); ymax = Math.max(ymax, y); }
  }
  if (ymin === ymax) { ymin -= 1; ymax += 1; }
  const pad = 6;
  const px = x => pad + (x - p.x0) / (p.x1 - p.x0) * (w - 2 * pad);
  const py = y => h - pad - (y - ymin) / (ymax - ymin) * (h - 2 * pad - 14);
  ctx.strokeStyle = col.ink; ctx.globalAlpha = 0.35; ctx.lineWidth = 1;
  if (ymin < 0 && ymax > 0) { ctx.beginPath(); ctx.moveTo(pad, py(0)); ctx.lineTo(w - pad, py(0)); ctx.stroke(); }
  if (p.x0 < 0 && p.x1 > 0) { ctx.beginPath(); ctx.moveTo(px(0), pad); ctx.lineTo(px(0), h - pad); ctx.stroke(); }
  ctx.globalAlpha = 1; ctx.lineWidth = 2;
  ctx.beginPath();
  let pen = false;
  for (const [x, y] of pts) {
    if (y === null) { pen = false; continue; }
    if (!pen) { ctx.moveTo(px(x), py(y)); pen = true; }
    else ctx.lineTo(px(x), py(y));
  }
  ctx.stroke();
  ctx.fillStyle = col.ink;
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.fillText(p.label + "  (TASTE = ZURUECK)", pad, h - 4);
  plotActive = c;
  beep(990, 0.06);
}
function closePlot() {
  if (plotActive) { plotActive.remove(); plotActive = null; }
}

// ---------- SNAKE ----------
let snake = null;
function startSnake() {
  pendingLevel = false;
  toggleHist(false);
  setPage("basic");
  const cv = makeLcdCanvas();
  snake = {
    cv, cols: 20, rows: 12,
    body: [[5, 6], [4, 6], [3, 6]],
    dir: [1, 0], nextDir: [1, 0],
    food: null, score: 0, over: false,
    speed: 160, timer: null
  };
  placeFood();
  snake.timer = setInterval(snakeTick, snake.speed);
  jingle([[660,.08,0],[880,.12,.1]]);
  drawSnake();
}
function placeFood() {
  let f;
  do {
    f = [Math.floor(Math.random() * snake.cols), Math.floor(Math.random() * snake.rows)];
  } while (snake.body.some(s => s[0] === f[0] && s[1] === f[1]));
  snake.food = f;
}
function snakeTick() {
  const s = snake;
  s.dir = s.nextDir;
  const head = [s.body[0][0] + s.dir[0], s.body[0][1] + s.dir[1]];
  const hitWall = head[0] < 0 || head[0] >= s.cols || head[1] < 0 || head[1] >= s.rows;
  const hitSelf = s.body.some(b => b[0] === head[0] && b[1] === head[1]);
  if (hitWall || hitSelf) { endSnake(); return; }
  s.body.unshift(head);
  if (head[0] === s.food[0] && head[1] === s.food[1]) {
    s.score++;
    beep(1320, 0.07);
    placeFood();
    clearInterval(s.timer);
    s.speed = Math.max(70, s.speed - 3);
    s.timer = setInterval(snakeTick, s.speed);
  } else {
    s.body.pop();
  }
  drawSnake();
}
function drawSnake() {
  const s = snake;
  const { ctx, w, h } = s.cv;
  const col = lcdColors();
  ctx.fillStyle = col.lcd; ctx.fillRect(0, 0, w, h);
  const cw = w / s.cols, ch = (h - 12) / s.rows;
  ctx.fillStyle = col.ink;
  for (const [x, y] of s.body) ctx.fillRect(x * cw + 1, y * ch + 13, cw - 2, ch - 2);
  const [fx, fy] = s.food;
  ctx.fillRect(fx * cw + cw * 0.3, fy * ch + 13 + ch * 0.3, cw * 0.4, ch * 0.4);
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.fillText("SNAKE  S:" + s.score + "  2/4/6/8 = STEUERN", 4, 9);
  if (s.over) {
    ctx.fillText("GAME OVER  S:" + s.score + " HI:" + (hiscores.snake || 0), 4, h / 2);
    ctx.fillText("TASTE = ZURUECK", 4, h / 2 + 12);
  }
}
function snakeDir(dx, dy) {
  const s = snake;
  if (s.dir[0] === -dx && s.dir[1] === -dy) return; // keine 180-Grad-Wende
  s.nextDir = [dx, dy];
}
function endSnake() {
  clearInterval(snake.timer);
  snake.over = true;
  if (snake.score > (hiscores.snake || 0)) { hiscores.snake = snake.score; store.save({ hiscores }); }
  jingle([[440,.12,0],[330,.12,.14],[220,.25,.28]]);
  drawSnake();
}
function quitSnake() {
  if (snake && snake.timer) clearInterval(snake.timer);
  if (snake) snake.cv.c.remove();
  snake = null;
  render();
}
function handleSnakeKey(a, txt) {
  if (snake.over) { quitSnake(); return; }
  if (a === "clear") { quitSnake(); return; }
  if (a === "digit") {
    if (txt === "8") snakeDir(0, -1);
    else if (txt === "2") snakeDir(0, 1);
    else if (txt === "4") snakeDir(-1, 0);
    else if (txt === "6") snakeDir(1, 0);
  }
}

// ---------- MATH ATTACK ----------
let game = null;
let pendingLevel = false;
const LEVELS = { 1: "EASY", 2: "NORMAL", 3: "HARD" };
let hiscores = (saved.hiscores && typeof saved.hiscores === "object") ? saved.hiscores : {};
if (Number.isFinite(saved.hiscore)) { hiscores[2] = Math.max(hiscores[2] || 0, saved.hiscore); }
const gameBtn = document.getElementById("gameBtn");

function genQuestion(level) {
  let ops = ["+", "-", "*", "/"];
  if (level === 1) ops = ["+", "-"];
  const op = ops[Math.floor(Math.random() * ops.length)];
  let a, b, ans;
  if (level === 1) {
    if (op === "+") { a = rnd(2, 20); b = rnd(2, 20); ans = a + b; }
    else { a = rnd(5, 20); b = rnd(2, a); ans = a - b; }
  } else if (level === 3) {
    if (op === "+") { a = rnd(50, 999); b = rnd(50, 999); ans = a + b; }
    else if (op === "-") { a = rnd(100, 999); b = rnd(50, a); ans = a - b; }
    else if (op === "*") { a = rnd(6, 19); b = rnd(6, 19); ans = a * b; }
    else { b = rnd(6, 19); ans = rnd(6, 19); a = b * ans; }
  } else {
    if (op === "+") { a = rnd(2, 99); b = rnd(2, 99); ans = a + b; }
    else if (op === "-") { a = rnd(10, 99); b = rnd(2, a); ans = a - b; }
    else if (op === "*") { a = rnd(2, 12); b = rnd(2, 12); ans = a * b; }
    else { b = rnd(2, 12); ans = rnd(2, 12); a = b * ans; }
  }
  return { text: a + " " + OPS[op] + " " + b, ans };
}
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function showLevelSelect() {
  pendingLevel = true;
  toggleHist(false);
  exprEl.textContent = "1-3 MATH / 5 SNAKE / AC ZURUECK";
  displayEl.textContent = "1 2 3  5";
  displayEl.classList.remove("small", "tiny");
}
function startGame(level) {
  pendingLevel = false;
  game = { level, score: 0, time: 30, over: false, mistakes: 0, q: genQuestion(level) };
  current = "0";
  game.timer = setInterval(() => {
    game.time--;
    if (game.time <= 0) endGame();
    else renderGame();
  }, 1000);
  jingle([[880,.08,0],[1100,.12,.1]]);
  renderGame();
}
function endGame() {
  clearInterval(game.timer);
  game.over = true;
  game.perfect = game.mistakes === 0 && game.score > 0;
  const l = game.level;
  if (game.score > (hiscores[l] || 0)) { hiscores[l] = game.score; store.save({ hiscores }); }
  if (game.perfect) jingle([[880,.08,0],[1100,.08,.09],[1320,.08,.18],[1760,.25,.27]]);
  else jingle([[440,.12,0],[330,.12,.14],[220,.25,.28]]);
  renderGame();
}
function quitGame() {
  if (game && game.timer) clearInterval(game.timer);
  game = null;
  actions.clear();
  render();
}
function renderGame() {
  if (game.over) {
    exprEl.textContent = (game.perfect ? "PERFECT! " : "GAME OVER ") + LEVELS[game.level] + " \u2013 TASTE = ZURUECK";
    displayEl.textContent = "S:" + game.score + " HI:" + (hiscores[game.level] || 0);
    displayEl.classList.add("small"); displayEl.classList.remove("tiny");
    return;
  }
  exprEl.textContent = game.q.text + " = ?  T:" + game.time + " S:" + game.score;
  const text = fmt(current);
  displayEl.textContent = text;
  displayEl.classList.toggle("small", text.length > 9);
  displayEl.classList.remove("tiny");
}
function handleGameKey(a) {
  if (game.over) { quitGame(); return; }
  if (a === "clear") { quitGame(); return; }
  if (a === "digit" || a === "comma" || a === "sign") return true;
  if (a === "equals") {
    if (parseFloat(current) === game.q.ans) {
      game.score++;
      beep(1320, 0.09);
    } else {
      game.mistakes++;
      beep(150, 0.2);
    }
    game.q = genQuestion(game.level);
    current = "0";
    renderGame();
  }
  return false;
}

    if (k === "ArrowRight") { snakeDir(1, 0); e.preventDefault(); return; }

  if (KEYMAP_KONAMI[k] !== undefined && !/^[0-9]$/.test(k)) konamiPush(KEYMAP_KONAMI[k]);
  let btn = null;
  if (/^[0-9]$/.test(k)) btn = [...document.querySelectorAll('.keys [data-a="digit"]')].find(b => b.textContent === k);
  else if (k === "," || k === ".") btn = document.querySelector('[data-a="comma"]');
  else if (["+", "-", "*", "/"].includes(k)) btn = document.querySelector(`.keys [data-op="${k}"]`);
  else if (k === "Enter" || k === "=") btn = document.querySelector('.keys [data-a="equals"]');
  else if (k === "Escape") btn = document.querySelector('[data-a="clear"]');
  else if (k === "%") btn = document.querySelector('[data-a="percent"]');
  else if (k === "r" || k === "w") btn = document.querySelector('[data-a="sqrt"]');
  if (btn) {
    e.preventDefault();

    setTimeout(() => btn.classList.remove("pressed"), 80);

});

if (navigator.getBattery) {
  navigator.getBattery().then((bat) => {
    const led = document.getElementById("led");
    const txt = document.getElementById("batTxt");
    const upd = () => {
      const p = Math.round(bat.level * 100);
      txt.textContent = "BATTERY " + p + "%" + (bat.charging ? " \u26a1" : "");
      led.classList.remove("ok", "mid", "low");
      if (p > 50) led.classList.add("ok");
      else if (p > 20) led.classList.add("mid");
      else led.classList.add("low");
    };
    bat.addEventListener("levelchange", upd);
    bat.addEventListener("chargingchange", upd);
    upd();
  }).catch(() => {});
}

document.getElementById("degBtn").textContent = degMode ? "DEG" : "RAD";
updateMemFlag();
render();
</script>
